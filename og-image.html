<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 60px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    p {
      font-size: 28px;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .tags {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bharath R</h1>
    <p>Java Full Stack Developer & Machine Learning Enthusiast</p>
    <div class="tags">
      <span class="tag">Java Spring Boot</span>
      <span class="tag">React.js</span>
      <span class="tag">Python</span>
      <span class="tag">Java Full Stack Developer</span>
    </div>
  </div>
</body>
</html>
